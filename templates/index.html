<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: radial-gradient(circle at top, #1e293b, #0f172a);
    font-family: 'Inter', sans-serif;
}

.container{
    width:420px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    backdrop-filter: blur(20px);
    border-radius: 25px;
    padding: 30px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.5);
    color: white;
}

.title{
    text-align:center;
    font-size:26px;
    font-weight:700;
    margin-bottom:5px;
}

.subtitle{
    text-align:center;
    font-size:13px;
    opacity:0.7;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:14px;
    margin:10px 0;
    border-radius:12px;
    border:none;
    outline:none;
    font-size:16px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background: linear-gradient(135deg, #3b82f6, #06b6d4);
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition: 0.2s;
}

button:hover{
    transform: scale(1.03);
}

.result{
    margin-top:20px;
    padding:15px;
    text-align:center;
    font-size:22px;
    font-weight:700;
    background: rgba(255,255,255,0.1);
    border-radius:12px;
}

.footer{
    margin-top:15px;
    text-align:center;
    font-size:11px;
    opacity:0.6;
}

</style>
</head>

<body>

<div class="container">

    <div class="title">🧮 Calculadora Pro</div>
    <div class="subtitle">Flask + Docker + CI/CD GitHub Actions</div>

    <form method="POST">
        <input type="number" step="any" name="num1" placeholder="Primer número" required>
        <input type="number" step="any" name="num2" placeholder="Segundo número" required>
        <button type="submit">Calcular suma</button>
    </form>

    {% if resultado is not none %}
        <div class="result">
            Resultado: {{ resultado }}
        </div>
    {% endif %}

    <div class="footer">
        ejercicio:3.0.0
    </div>

</div>

</body>
</html>
